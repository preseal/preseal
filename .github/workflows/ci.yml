name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install langchain-core langgraph
      - name: Run unit tests
        run: python tests/test_comprehensive.py
      - name: Run audit tests
        run: python tests/test_audit.py
      - name: Run real-world pattern tests
        run: python tests/test_real_world.py
      - name: Dogfood - audit our own example
        run: preseal audit examples/vulnerable_agent.py --json
