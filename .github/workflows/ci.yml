name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install preseal
        run: pip install -e ".[dev]"

      - name: Unit tests
        run: python tests/test_comprehensive.py

      - name: Audit tests
        run: python tests/test_audit.py

      - name: Scanner tests
        run: python tests/test_scanner.py

      - name: Real-world scenario tests
        run: python tests/test_real_agent_scenarios.py

      - name: Version check
        run: preseal version

  # Showcase: how preseal looks in a real CI pipeline
  dogfood:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install preseal
        run: pip install -e .

      # Audit the vulnerable example — should find HIGH findings (exit 1)
      - name: "Demo: audit vulnerable agent (expects findings)"
        run: |
          echo "--- Auditing deliberately vulnerable agent ---"
          echo "Expected: HIGH findings, exit code 1"
          preseal audit examples/vulnerable_agent.py || true
          echo ""
          echo "Exit code 1 is correct — preseal detected missing system prompt."

      # Run demo scan — should find 4 STRUCTURAL (exit 1)
      - name: "Demo: scan vulnerable agent (expects STRUCTURAL)"
        run: |
          echo "--- Scanning with Pass³ (3 trials for speed) ---"
          preseal scan --demo --trials 3 || true
          echo ""
          echo "STRUCTURAL findings are correct — this is a deliberately vulnerable agent."

      # Run compare demo — should show 4 FIXED
      - name: "Demo: compare vulnerable vs secure (expects FIXED)"
        run: |
          echo "--- Comparing vulnerable vs hardened configuration ---"
          preseal compare --demo --trials 3
          echo ""
          echo "4 FIXED = hardened configuration resolves all vulnerabilities."

      # This is what a REAL user's CI would look like:
      - name: "Example: what your CI pipeline looks like"
        run: |
          echo "==================================================="
          echo "In YOUR repo, add this to .github/workflows/:"
          echo ""
          echo "  - run: pip install preseal"
          echo "  - run: preseal audit ./src/agent.py"
          echo "  - run: preseal diff --target src.agent:agent"
          echo ""
          echo "Exit 0 = safe to merge. Exit 1 = security regression."
          echo "==================================================="
